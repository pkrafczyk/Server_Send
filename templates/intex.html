<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Download Status</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f7f7f7; }
        .box { background: white; padding: 40px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .progress-container { width: 400px; background-color: #e0e0e0; margin: 20px auto; border-radius: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 35px; background-color: red; text-align: center; line-height: 35px; color: white; font-weight: bold; transition: width 0.2s; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Manueller TCP-Socket Stream</h1>
        <div class="progress-container">
            <div id="bar" class="progress-bar">0%</div>
        </div>
        <p id="status-text">Starte Download-Verbindung...</p>
    </div>

    <script>
        // Startet das automatische Abrufen der Socket-Daten
        const eventSource = new EventSource("/stream-status");

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const bar = document.getElementById("bar");
            const statusText = document.getElementById("status-text");

            bar.style.width = data.prozent + "%";
            bar.innerText = data.prozent + "%";
            statusText.innerText = `Fortschritt: ${data.geladen.toFixed(1)} MB von ${data.gesamt.toFixed(1)} MB`;

            if (data.prozent >= 100) {
                bar.style.backgroundColor = "green";
                statusText.innerText = "Download komplett fertiggestellt!";
                eventSource.close();
            }
        };

        eventSource.onerror = function() {
            console.log("Stream gestoppt.");
            eventSource.close();
        };
    </script>
</body>
</html>
